<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AURA // Premium Atelier</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Alpine.js for State Management -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <!-- Google Fonts & Lucide Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0b0b0b; color: #f5f5f7; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .admin-glass { background: rgba(10, 10, 12, 0.85); backdrop-filter: blur(20px); border-left: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body x-data="shopEngine()">

    <!-- NAVIGATION BAR -->
    <nav class="sticky top-0 z-40 w-full glass border-b border-white/5 px-6 py-4 flex justify-between items-center">
        <div class="text-xl font-light tracking-[0.3em] uppercase">A U R A</div>
        <div class="flex items-center gap-6">
            <!-- Admin Toggle Button -->
            <button @click="isAdminOpen = !isAdminOpen" class="text-xs tracking-widest uppercase bg-white/10 hover:bg-white/20 px-4 py-2 rounded-full transition-all flex items-center gap-2">
                <i data-lucide="sliders-horizontal" class="w-3 h-3"></i> Admin Console
            </button>
            <!-- Cart Button -->
            <button @click="isCartOpen = true" class="relative p-2 hover:opacity-70 transition-all">
                <i data-lucide="shopping-bag" class="w-6 h-6"></i>
                <span x-show="cartCount() > 0" x-text="cartCount()" class="absolute -top-1 -right-1 bg-white text-black text-[10px] font-bold w-4 h-4 rounded-full flex items-center justify-center"></span>
            </button>
        </div>
    </nav>

    <!-- HERO SECTION -->
    <header class="relative h-[40vh] flex flex-col justify-center items-center text-center px-4 overflow-hidden">
        <div class="absolute inset-0 bg-gradient-to-b from-purple-900/10 via-transparent to-transparent opacity-50 pointer-events-none"></div>
        <h1 class="text-4xl md:text-6xl font-light tracking-tight mb-3 uppercase">Couture Modernity</h1>
        <p class="text-sm md:text-base text-zinc-400 font-light max-w-md tracking-wide">Drop 01 // Avant-Garde Essentials engineered for the modern paradigm.</p>
    </header>

    <!-- MAIN PRODUCT GRID -->
    <main class="max-w-7xl mx-auto px-6 pb-24">
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8">
            <template x-for="product in products" :key="product.id">
                <div class="group relative flex flex-col justify-between rounded-2xl overflow-hidden transition-all duration-500 hover:-translate-y-1">
                    <!-- Image Wrapper -->
                    <div class="relative aspect-[3/4] w-full bg-zinc-900 rounded-2xl overflow-hidden mb-4">
                        <img :src="product.image" :alt="product.name" class="w-full h-full object-cover grayscale group-hover:grayscale-0 transition-all duration-700 ease-out scale-100 group-hover:scale-105">
                        
                        <!-- Badges -->
                        <div class="absolute top-3 left-3 flex flex-col gap-2">
                            <span x-show="!product.inStock" class="bg-black/80 text-rose-400 text-[10px] tracking-widest uppercase px-3 py-1 rounded-full font-medium backdrop-blur-md border border-rose-500/20">
                                Sold Out
                            </span>
                            <span x-show="product.onSale && product.inStock" class="bg-white text-black text-[10px] tracking-widest uppercase px-3 py-1 rounded-full font-bold">
                                Promo Active
                            </span>
                        </div>
                    </div>

                    <!-- Details -->
                    <div class="flex justify-between items-start px-1">
                        <div>
                            <h3 class="font-medium text-sm tracking-wide text-zinc-200" x-text="product.name"></h3>
                            <p class="text-xs text-zinc-500 mt-0.5" x-text="product.category"></p>
                        </div>
                        <div class="text-right">
                            <span class="text-sm font-medium tracking-wide" :class="product.onSale ? 'text-emerald-400 font-semibold' : 'text-zinc-300'" x-text="formatPrice(product.price)"></span>
                            <p x-show="product.onSale" class="text-[10px] text-zinc-500 line-through mt-0.5" x-text="formatPrice(product.originalPrice)"></p>
                        </div>
                    </div>

                    <!-- Action Button -->
                    <button 
                        @click="addToCart(product)"
                        :disabled="!product.inStock"
                        class="mt-4 w-full py-3 rounded-xl font-medium tracking-wide text-xs uppercase transition-all duration-300"
                        :class="product.inStock ? 'bg-white text-black hover:bg-zinc-200 cursor-pointer' : 'bg-zinc-800 text-zinc-600 cursor-not-allowed'">
                        <span x-text="product.inStock ? 'Add To Bag' : 'Out Of Stock'"></span>
                    </button>
                </div>
            </template>
        </div>
    </main>

    <!-- CART SIDEBAR DRAWER -->
    <div x-show="isCartOpen" class="fixed inset-0 z-50 overflow-hidden" style="display: none;">
        <div class="absolute inset-0 bg-black/60 backdrop-blur-sm transition-opacity" @click="isCartOpen = false"></div>
        <div class="absolute inset-y-0 right-0 max-w-full flex pl-10">
            <div class="w-screen max-w-md admin-glass text-white flex flex-col justify-between shadow-2xl">
                <!-- Header -->
                <div class="px-6 py-6 border-b border-white/10 flex items-center justify-between">
                    <h2 class="text-lg font-light tracking-widest uppercase flex items-center gap-2">
                        <i data-lucide="shopping-bag" class="w-5 h-5"></i> Your Bag
                    </h2>
                    <button @click="isCartOpen = false" class="p-2 hover:opacity-60"><i data-lucide="x" class="w-5 h-5"></i></button>
                </div>

                <!-- Items list -->
                <div class="flex-1 overflow-y-auto px-6 py-4 space-y-6">
                    <template x-show="cart.length === 0">
                        <div class="h-full flex flex-col items-center justify-center text-zinc-500 space-y-2">
                            <i data-lucide="ghost" class="w-8 h-8 opacity-40"></i>
                            <p class="text-xs tracking-wider uppercase">Your bag is empty</p>
                        </div>
                    </template>
                    
                    <template x-for="item in cart" :key="item.id">
                        <div class="flex items-center gap-4 border-b border-white/5 pb-4">
                            <img :src="item.image" class="w-16 h-20 object-cover bg-zinc-900 rounded-lg">
                            <div class="flex-1">
                                <h4 class="text-sm font-medium" x-text="item.name"></h4>
                                <p class="text-xs text-zinc-400 mt-1" x-text="formatPrice(item.price)"></p>
                                <div class="flex items-center gap-2 mt-2">
                                    <button @click="updateQty(item.id, -1)" class="w-6 h-6 rounded bg-white/5 flex items-center justify-center text-xs hover:bg-white/10">-</button>
                                    <span class="text-xs px-2" x-text="item.quantity"></span>
                                    <button @click="updateQty(item.id, 1)" class="w-6 h-6 rounded bg-white/5 flex items-center justify-center text-xs hover:bg-white/10">+</button>
                                </div>
                            </div>
                            <button @click="removeFromCart(item.id)" class="text-zinc-500 hover:text-rose-400 transition-colors"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                        </div>
                    </template>
                </div>

                <!-- Footer Summary -->
                <div class="p-6 border-t border-white/10 space-y-4 bg-black/40">
                    <div class="flex justify-between text-sm">
                        <span class="text-zinc-400">Subtotal</span>
                        <span x-text="formatPrice(cartTotal())"></span>
                    </div>
                    <div class="pt-4">
                        <button @click="triggerStripeMock()" class="w-full bg-emerald-500 hover:bg-emerald-400 text-black font-semibold py-4 rounded-xl transition-all tracking-wider text-xs uppercase shadow-lg shadow-emerald-500/10">
                            Proceed to Checkout (Stripe)
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- ADMIN CONSOLE DRAWER (LIVE SHOP CONTROL) -->
    <div x-show="isAdminOpen" class="fixed inset-y-0 left-0 w-screen max-w-sm z-50 admin-glass p-6 text-white flex flex-col justify-between shadow-2xl" style="display: none;">
        <div>
            <div class="flex justify-between items-center border-b border-white/10 pb-4 mb-6">
                <h3 class="text-sm tracking-widest font-semibold uppercase flex items-center gap-2 text-purple-400">
                    <i data-lucide="terminal" class="w-4 h-4"></i> Backoffice Simulator
                </h3>
                <button @click="isAdminOpen = false" class="p-1 hover:opacity-60"><i data-lucide="x" class="w-4 h-4"></i></button>
            </div>
            
            <p class="text-xs text-zinc-400 mb-6 leading-relaxed">Toggle product parameters below to see how the e-shop UI adapts dynamically in real time.</p>
            
            <div class="space-y-4 overflow-y-auto max-h-[70vh] pr-2">
                <template x-for="product in products" :key="'admin-'+product.id">
                    <div class="p-3 bg-white/5 rounded-xl border border-white/5 space-y-3">
                        <div class="flex justify-between items-center">
                            <span class="text-xs font-medium text-zinc-200" x-text="product.name"></span>
                            <span class="text-[10px] text-zinc-500 font-mono" x-text="formatPrice(product.price)"></span>
                        </div>
                        <div class="flex gap-4">
                            <!-- Stock Control Toggle -->
                            <label class="flex items-center gap-2 cursor-pointer text-xs">
                                <input type="checkbox" x-model="product.inStock" class="rounded bg-zinc-800 border-zinc-700 checked:bg-purple-500">
                                <span :class="product.inStock ? 'text-emerald-400' : 'text-rose-400'" x-text="product.inStock ? 'In Stock' : 'Sold Out'"></span>
                            </label>
                            <!-- Promo Control Toggle -->
                            <label class="flex items-center gap-2 cursor-pointer text-xs">
                                <input type="checkbox" x-model="product.onSale" @change="togglePromo(product)" class="rounded bg-zinc-800 border-zinc-700 checked:bg-purple-500">
                                <span class="text-zinc-300">Run Promo</span>
                            </label>
                        </div>
                    </div>
                </template>
            </div>
        </div>
        <div class="text-[10px] text-center text-zinc-600 border-t border-white/5 pt-4">AURA Core Engine v2026.1</div>
    </div>

    <!-- SCRIPTS & CORE SIMULATOR LOGIC -->
    <script>
        function shopEngine() {
            return {
                isCartOpen: false,
                isAdminOpen: false,
                cart: [],
                products: [
                    { id: 1, name: "Minimalist Trench Coat", category: "Outerwear", price: 280, originalPrice: 280, inStock: true, onSale: false, image: "https://images.unsplash.com/photo-1591047139829-d91aecb6caea?auto=format&fit=crop&q=80&w=600" },
                    { id: 2, name: "Structured Modular Blazer", category: "Tailoring", price: 340, originalPrice: 340, inStock: true, onSale: false, image: "https://images.unsplash.com/photo-1548883354-7622d03aca27?auto=format&fit=crop&q=80&w=600" },
                    { id: 3, name: "Asymmetric Knit Sweater", category: "Knitwear", price: 190, originalPrice: 190, inStock: false, onSale: false, image: "https://images.unsplash.com/photo-1614975058789-41316d0e2e9c?auto=format&fit=crop&q=80&w=600" },
                    { id: 4, name: "Raw Denim Cargo Trouser", category: "Bottoms", price: 210, originalPrice: 210, inStock: true, onSale: false, image: "https://images.unsplash.com/photo-1541099649105-f69ad21f3246?auto=format&fit=crop&q=80&w=600" }
                ],
                
                formatPrice(val) {
                    return new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' }).format(val);
                },
                addToCart(product) {
                    if(!product.inStock) return;
                    let existingItem = this.cart.find(item => item.id === product.id);
                    if (existingItem) {
                        existingItem.quantity++;
                    } else {
                        this.cart.push({ ...product, quantity: 1 });
                    }
                    this.isCartOpen = true;
                },
                removeFromCart(id) {
                    this.cart = this.cart.filter(item => item.id !== id);
                },
                updateQty(id, delta) {
                    let item = this.cart.find(i => i.id === id);
                    if (!item) return;
                    item.quantity += delta;
                    if (item.quantity <= 0) this.removeFromCart(id);
                },
                cartCount() {
                    return this.cart.reduce((sum, item) => sum + item.quantity, 0);
                },
                cartTotal() {
                    return this.cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
                },
                togglePromo(product) {
                    if(product.onSale) {
                        product.price = Math.round(product.originalPrice * 0.85); // 15% Off
                    } else {
                        product.price = product.originalPrice;
                    }
                    // Sync active items inside cart if dynamic promo state updates live
                    let cartItem = this.cart.find(i => i.id === product.id);
                    if(cartItem) cartItem.price = product.price;
                },
                triggerStripeMock() {
                    if (this.cart.length === 0) return alert("Your bag is empty.");
                    alert(`🚀 Initializing Secure Stripe Checkout Session Request...\n\nProcessing payment payload for: ${this.formatPrice(this.cartTotal())}\n\nIn a real app, your server would now redirect the user to checkout.stripe.com`);
                }
            }
        }
        // Initialize Lucide icons on layout updates
        document.addEventListener("DOMContentLoaded", () => { lucide.createIcons(); });
    </script>
</body>
</html>
